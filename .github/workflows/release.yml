name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build app bundle
        run: make build

      - name: Zip app bundle
        run: zip -r "VoiceInput-${{ github.ref_name }}.zip" VoiceInput.app

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "VoiceInput ${{ github.ref_name }}" \
            --generate-notes \
            "VoiceInput-${{ github.ref_name }}.zip"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
